name: Build HiGHSMEX

on:
  push:
    branches:
      - testing
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            highs_archive: highs-1.15.1-x86_64-linux-gnu-static-apache.tar.gz
          - os: macos-latest
            highs_archive: highs-1.15.1-arm-apple-static-apache.tar.gz
          - os: windows-latest
            highs_archive: highs-1.15.1-x86_64-windows-static-apache.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Configure MATLAB
        uses: MATPOWER/action-configure-matlab@v3-test

      - name: Download and extract HiGHS (static)
        shell: bash
        run: |
          zipname="${{ matrix.highs_archive }}"
          url="https://github.com/ERGO-Code/HiGHS/releases/download/v1.15.1/${zipname}"
          echo "Downloading: $url"
          parent="$(dirname "${{ github.workspace }}")"
          echo "Parent: $parent"
          archive="${parent}/${zipname}"
          curl -L -o "$archive" "$url"
          dest="${parent}/HiGHS"
          echo $dest
          mkdir -p "$dest"
          if [[ "$zipname" == *.tar.gz ]]; then
            tar -xzf "$archive" -C "$dest"
          else
            unzip -o "$archive" -d "$dest"
          fi
          echo "parent dir"
          ls -al ..
          echo "HiGHS dir from: ${{ matrix.highs_archive }}"
          ls -al "$dest"
          find "$dest" -maxdepth 2 -type d -print

      - name: List MEX files (before)
        shell: bash
        run: |
          echo "repo root MEX files"
          ls -al *.mex* || true

      - name: Build MEX (ci_make_highsmex.m)
        shell: bash
        run: |
          $ML_CMD "ver; cd '${{ github.workspace }}'; ci_make_highsmex"

      - name: List MEX files (after)
        shell: bash
        run: |
          ls -al *.mex* || true

      - name: Check MEX functionality
        shell: bash
        run: |
          $ML_CMD "fprintf('HiGHS Version: %s\nHiGHSMEX Version: %s\n', callhighs(string('ver')), verHiGHSMEX)"
          $ML_CMD "c = [1;1]; soln=callhighs(c,c', 2, 2, c, c)"
