name: Build HiGHSMEX (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Configure MATLAB
        uses: MATPOWER/action-configure-matlab@v3-test

      - name: Download HiGHS (Windows static)
        shell: pwsh
        run: |
          curl -L -O "https://github.com/ERGO-Code/HiGHS/releases/download/v1.15.1/highs-1.15.1-x86_64-windows-static-apache.zip"
          Expand-Archive -Path "highs-1.15.1-x86_64-windows-static-apache.zip" -DestinationPath "${{ github.workspace }}" -Force

      - name: List resulting files
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force ${{ github.workspace }} | Select-Object FullName

      - name: Build MEX (make_highsmex.m)
        shell: bash
        run: |
          $ML_CMD ver
          $ML_CMD "cd '${{ github.workspace }}'; make_highsmex"

      - name: List resulting files (again)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force ${{ github.workspace }} | Select-Object FullName
