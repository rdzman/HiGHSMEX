name: Build HiGHSMEX (Windows)

on:
  push:
    branches:
      - testing
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Configure MATLAB
        uses: MATPOWER/action-configure-matlab@v3-test

      - name: Download HiGHS (Windows static)
        shell: pwsh
        run: |
          echo "${{ github.workspace }}"
          $zip = "highs-1.15.1-x86_64-windows-static-apache.zip"
          $url = "https://github.com/ERGO-Code/HiGHS/releases/download/v1.15.1/$zip"
          curl -L -O $url
          $dest = Join-Path "${{ github.workspace }}" ($zip -replace '\.zip$','')
          Expand-Archive -Path $zip -DestinationPath $dest -Force

      - name: List resulting files (bash)
        shell: bash
        run: |
          echo "parent dir"
          ls -al ..
          echo "MEX files"
          ls -al *.mex*

      - name: Build MEX (make_highsmex.m)
        shell: bash
        run: |
          $ML_CMD "ver; cd '${{ github.workspace }}'; make_highsmex"

      - name: List resulting files (bash)
        shell: bash
        run: |
          ls -al *.mex*

      - name: List resulting files (pwsh)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force ${{ github.workspace }} | Select-Object FullName
