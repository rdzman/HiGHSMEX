name: Build HiGHSMEX (Windows)

on:
  push:
    branches:
      - testing
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2

      - name: Configure MATLAB
        uses: MATPOWER/action-configure-matlab@v3-test

      - name: Download HiGHS (Windows static)
        shell: bash
        run: |
          zipname="highs-1.15.1-x86_64-windows-static-apache.zip"
          echo $zipname
          url="https://github.com/ERGO-Code/HiGHS/releases/download/v1.15.1/${zipname}"
          echo $url
          parent="$(dirname "${{ github.workspace }}")"
          echo $parent
          zip="${parent}/${zipname}"
          curl -L -o "$zip" "$url"
          dest="${parent}/HiGHS"
          echo $dest
          mkdir -p "$dest"
          unzip -o "$zip" -d "$dest"

      - name: List parent folder and MEX files (before)
        shell: bash
        run: |
          echo "parent dir"
          ls -al ..
          echo "repo root MEX files"
          ls -al *.mex* || true

      - name: Build MEX (make_highsmex.m)
        shell: bash
        run: |
          $ML_CMD "ver; cd '${{ github.workspace }}'; make_highsmex"

      - name: List MEX files (after)
        shell: bash
        run: |
          ls -al *.mex* || true

      - name: List resulting files (pwsh)
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Force ${{ github.workspace }} | Select-Object FullName
